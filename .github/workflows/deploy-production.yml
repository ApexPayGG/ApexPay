# Wdrożenie produkcyjne ApexPay: uruchamiane TYLKO po zielonym CI na main (ten sam commit co testy).
# Build obrazu multi-stage → GHCR → SSH + docker compose na serwerze.
name: Deploy production

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

concurrency:
  group: deploy-production-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  actions: read

jobs:
  build-push:
    name: Build & Push
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout (commit z zakończonego CI)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Image name (GHCR, lowercase)
        id: meta
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${REPO_LOWER}/apexpay-api:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.image }}

  deploy:
    name: Deploy
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@master
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GHCR_USERNAME
          script: |
            set -euo pipefail
            cd /opt/apexpay-api
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            export APEXPAY_API_IMAGE="ghcr.io/${REPO_LOWER}/apexpay-api:latest"
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            COMPOSE_CMD="docker compose -f docker-compose.prod.yml"
            if [ -f .env.prod ]; then
              COMPOSE_CMD="$COMPOSE_CMD --env-file .env.prod"
            fi

            $COMPOSE_CMD pull api api-migrator

            set +e
            $COMPOSE_CMD up -d
            UP_EXIT=$?
            set -e

            if [ "$UP_EXIT" -ne 0 ]; then
              echo "[deploy] docker compose up failed, printing diagnostics..."
              $COMPOSE_CMD ps || true
              docker logs --tail 200 apexpay-prod-api-migrator-1 || true
              docker logs --tail 120 apexpay-prod-postgres-1 || true
              exit "$UP_EXIT"
            fi

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [build-push, deploy]
    if: >-
      always() &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - name: Slack — raport wdrożenia
        if: env.SLACK_WEBHOOK_URL != ''
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_COLOR: ${{ (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) && '#ff0000' || '#36a64f' }}
          SLACK_TITLE: Raport z wdrożenia ApexPay
          SLACK_MESSAGE: "Etap build-push: ${{ needs.build-push.result }} | Etap deploy: ${{ needs.deploy.result }} | Commit: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha }} | CI: ${{ github.event.workflow_run.html_url }}"
