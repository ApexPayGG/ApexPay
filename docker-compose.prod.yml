# Produkcja: split API + WEB, publiczny dostęp przez Traefik (80/443), infrastruktura self-hosted lub managed.
# Uruchomienie:
#  - self-hosted DB/Redis/RabbitMQ: docker compose -f docker-compose.prod.yml --profile selfhosted --env-file .env.prod up -d
#  - managed DB/Redis:            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d

name: apexpay-prod

x-logging: &json-file-rotating
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # v3.0 używał Docker API 1.24 — na Docker Engine 28.5+ / 29 daemon odrzuca klienta (min. 1.40/1.44). v3.6+ negocjuje API.
  traefik:
    image: traefik:v3.6.7
    restart: unless-stopped
    networks:
      - apexpay_prod_network
    ports:
      - "80:80"
      - "443:443"
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=apexpay_prod_network"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?set ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    logging: *json-file-rotating

  postgres:
    image: postgres:16-alpine
    profiles: ["selfhosted"]
    networks:
      - apexpay_prod_network
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *json-file-rotating

  redis:
    image: redis:7-alpine
    profiles: ["selfhosted"]
    networks:
      - apexpay_prod_network
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *json-file-rotating

  rabbitmq:
    image: rabbitmq:3-management-alpine
    profiles: ["selfhosted"]
    networks:
      - apexpay_prod_network
    ports:
      # AMQP 5672 tylko w sieci Docker (API: host rabbitmq). Panel UI — wyłącznie localhost na hoście.
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?set RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging: *json-file-rotating

  api-migrator:
    image: ${APEXPAY_API_IMAGE:-apexpay-api:latest}
    networks:
      - apexpay_prod_network
    command: ["npx", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
      rabbitmq:
        condition: service_healthy
        required: false
    restart: "no"
    logging: *json-file-rotating

  api:
    image: ${APEXPAY_API_IMAGE:-apexpay-api:latest}
    networks:
      - apexpay_prod_network
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      REDIS_URL: ${REDIS_URL:?set REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL:?set RABBITMQ_URL}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-apexpay.events}
      PSP_DEPOSIT_WEBHOOK_SECRET: ${PSP_DEPOSIT_WEBHOOK_SECRET:-}
      TRUST_PROXY: ${TRUST_PROXY:-1}
      AUTH_RATE_WINDOW_MS: ${AUTH_RATE_WINDOW_MS:-60000}
      AUTH_RATE_MAX_REQUESTS: ${AUTH_RATE_MAX_REQUESTS:-25}
      ADMIN_FUND_RATE_WINDOW_MS: ${ADMIN_FUND_RATE_WINDOW_MS:-60000}
      ADMIN_FUND_RATE_MAX_REQUESTS: ${ADMIN_FUND_RATE_MAX_REQUESTS:-20}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://${APP_DOMAIN:?set APP_DOMAIN}}
    labels:
      - traefik.enable=true
      - traefik.docker.network=apexpay_prod_network
      - "traefik.http.routers.api.rule=Host(`${API_DOMAIN:?set API_DOMAIN}`)"
      - traefik.http.routers.api.service=api
      - traefik.http.routers.api.entrypoints=websecure
      - traefik.http.routers.api.tls.certresolver=letsencrypt
      - traefik.http.services.api.loadbalancer.server.port=3000
      - traefik.http.middlewares.api-ratelimit.ratelimit.average=${TRAEFIK_API_RATE_AVERAGE:-150}
      - traefik.http.middlewares.api-ratelimit.ratelimit.burst=${TRAEFIK_API_RATE_BURST:-300}
      - traefik.http.routers.api.middlewares=api-ratelimit
      # Ten sam host co front: /api/* → API (JSON), nie index.html ze statycznego webu.
      # Jawny service=api — bez tego router api-inapp nie łączy się z loadbalancerem (Traefik szukałby usługi api-inapp), POST /api/... trafiałby w nginx SPA → 405.
      - "traefik.http.routers.api-inapp.rule=Host(`${APP_DOMAIN:?set APP_DOMAIN}`) && PathPrefix(`/api`)"
      - traefik.http.routers.api-inapp.service=api
      - traefik.http.routers.api-inapp.entrypoints=websecure
      - traefik.http.routers.api-inapp.tls.certresolver=letsencrypt
      - traefik.http.routers.api-inapp.middlewares=api-ratelimit
      - traefik.http.routers.api-inapp.priority=100
    depends_on:
      api-migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
        required: false
      rabbitmq:
        condition: service_healthy
        required: false
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: "1G"
      restart_policy:
        condition: on-failure
    logging: *json-file-rotating

  web:
    image: ${APEXPAY_WEB_IMAGE:-apexpay-web:latest}
    networks:
      - apexpay_prod_network
    labels:
      - traefik.enable=true
      - traefik.docker.network=apexpay_prod_network
      # Bez !PathPrefix(/api) router web pasuje do całego hosta — przy złym priorytecie lub konflikcie POST /api/… ląduje w nginx SPA (HTML / 405 zamiast JSON).
      - "traefik.http.routers.web.rule=Host(`${APP_DOMAIN:?set APP_DOMAIN}`) && !PathPrefix(`/api`)"
      - traefik.http.routers.web.entrypoints=websecure
      - traefik.http.routers.web.tls.certresolver=letsencrypt
      - traefik.http.routers.web.priority=1
      - traefik.http.services.web.loadbalancer.server.port=8080
      - traefik.http.middlewares.web-security.headers.contentTypeNosniff=true
      - traefik.http.middlewares.web-security.headers.browserXssFilter=true
      - traefik.http.middlewares.web-security.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.middlewares.web-security.headers.forceSTSHeader=true
      - traefik.http.middlewares.web-security.headers.stsSeconds=31536000
      - traefik.http.middlewares.web-security.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.web-security.headers.stsPreload=true
      - traefik.http.routers.web.middlewares=web-security
    restart: unless-stopped
    logging: *json-file-rotating

  skillgaming-web:
    image: ${SKILLGAMING_WEB_IMAGE:-skillgaming-web:latest}
    restart: unless-stopped
    networks:
      - apexpay_prod_network
    expose:
      - "80"
    labels:
      - traefik.enable=true
      - traefik.docker.network=apexpay_prod_network
      - "traefik.http.routers.skillgaming.rule=Host(`${SKILLGAMING_APP_DOMAIN:?set SKILLGAMING_APP_DOMAIN}`)"
      - traefik.http.routers.skillgaming.entrypoints=websecure
      - traefik.http.routers.skillgaming.tls.certresolver=letsencrypt
      - traefik.http.services.skillgaming.loadbalancer.server.port=80
      - traefik.http.middlewares.skillgaming-security.headers.contentTypeNosniff=true
      - traefik.http.middlewares.skillgaming-security.headers.browserXssFilter=true
      - traefik.http.middlewares.skillgaming-security.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.middlewares.skillgaming-security.headers.forceSTSHeader=true
      - traefik.http.middlewares.skillgaming-security.headers.stsSeconds=31536000
      - traefik.http.middlewares.skillgaming-security.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.skillgaming-security.headers.stsPreload=true
      - traefik.http.routers.skillgaming.middlewares=skillgaming-security
    logging: *json-file-rotating

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  traefik_letsencrypt:

networks:
  apexpay_prod_network:
    name: apexpay_prod_network
    driver: bridge